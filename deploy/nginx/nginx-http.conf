# ============================================
# NGINX CONFIGURATION - Mapa de Saúde Corumbá (HTTP)
# ============================================

# Upstream para o backend Node.js
upstream mapasaude_api {
    server 127.0.0.1:8006;
    keepalive 64;
}

# Servidor HTTP
server {
    listen 8005;
    listen [::]:8005;
    server_name localhost 172.16.0.24 mapadasaude.projetoestrategico.app;

    # Tamanho máximo de upload
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/mapasaude_access.log;
    error_log /var/log/nginx/mapasaude_error.log;

    # Headers de segurança
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # FRONTEND (Build estático)
    root /dados/www/mapa_saude/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # BACKEND API (Proxy Reverso)
    location /api/ {
        proxy_pass http://mapasaude_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # UPLOADS (Proxy para Backend)
    location /uploads/ {
        proxy_pass http://mapasaude_api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # HEALTH CHECK
    location /health {
        proxy_pass http://mapasaude_api/health;
        access_log off;
    }

    # Bloqueios de segurança
    location ~ /\. {
        deny all;
    }

    # Compressão GZIP
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
}
